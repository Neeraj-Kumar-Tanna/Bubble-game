<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bubble Game</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="box">
        <div id="box_top">
            <div class="element">
                <h2>Hit</h2>
                <div id="hitVal" class="score">1</div>
            </div>

            <div class="element">
                <h2>Time</h2>
                <div id="timer" class="score">20</div>
            </div>

            <div class="element">
                <h2>Score</h2>
                <div id="scoreVal" class="score">0</div>
            </div>
        </div>
        <div id="box_btm">
            
        </div>
    </div>
    <div id="menu">
        <button id="start_btn" class="btn">Start</button>
        <button id="pause_btn" class="btn">Pause</button>
        <button id="restart_btn" class="btn">Restart</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
